<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notes</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', sans-serif;
            overflow: hidden;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* ── Toolbar ── */
        #toolbar {
            display: flex;
            align-items: center;
            gap: 4px;
            padding: 6px 12px;
            background: #f3f3f3;
            border-bottom: 1px solid #d0d0d0;
            flex-wrap: wrap;
            user-select: none;
            z-index: 1000;
        }
        #toolbar .sep {
            width: 1px;
            height: 24px;
            background: #ccc;
            margin: 0 4px;
        }
        #toolbar button {
            background: #fff;
            border: 1px solid #c0c0c0;
            border-radius: 3px;
            padding: 4px 8px;
            font-size: 13px;
            cursor: pointer;
            font-family: inherit;
            min-width: 28px;
            height: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        #toolbar button:hover { background: #e8e8e8; }
        #toolbar button.active { background: #d0d8e8; border-color: #8899bb; }
        #toolbar select, #toolbar input[type="color"] {
            height: 28px;
            border: 1px solid #c0c0c0;
            border-radius: 3px;
            font-size: 13px;
            cursor: pointer;
            font-family: inherit;
        }
        #toolbar select { padding: 2px 4px; }
        #toolbar input[type="color"] {
            width: 32px;
            padding: 1px;
            background: #fff;
        }

        /* ── Main Area (sidebar + canvas) ── */
        #main {
            flex: 1;
            display: flex;
            min-height: 0;
        }

        /* ── Page Panel ── */
        #pagePanel {
            width: 200px;
            background: #f0f0f0;
            border-right: 1px solid #d0d0d0;
            display: flex;
            flex-direction: column;
            user-select: none;
            flex-shrink: 0;
        }
        #pagePanel .panel-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 12px 8px;
            border-bottom: 1px solid #d8d8d8;
        }
        #pagePanel .panel-header span {
            font-size: 13px;
            font-weight: 600;
            color: #444;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        #pagePanel .panel-header button {
            background: #4a90d9;
            color: #fff;
            border: none;
            border-radius: 3px;
            width: 24px;
            height: 24px;
            font-size: 16px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            line-height: 1;
        }
        #pagePanel .panel-header button:hover { background: #3a7bc8; }
        #pageList {
            flex: 1;
            overflow-y: auto;
            padding: 4px 0;
        }
        .page-item {
            display: flex;
            align-items: center;
            padding: 8px 12px;
            cursor: pointer;
            font-size: 13px;
            color: #333;
            border-left: 3px solid transparent;
        }
        .page-item:hover { background: #e4e4e4; }
        .page-item.active {
            background: #dce8f5;
            border-left-color: #4a90d9;
            font-weight: 600;
        }
        .page-item .page-name {
            flex: 1;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .page-item .page-name[contenteditable="true"] {
            background: #fff;
            border: 1px solid #4a90d9;
            border-radius: 2px;
            padding: 0 4px;
            outline: none;
        }
        .page-item .page-delete {
            display: none;
            background: none;
            border: none;
            color: #aaa;
            font-size: 15px;
            cursor: pointer;
            padding: 0 2px;
            margin-left: 4px;
            line-height: 1;
        }
        .page-item:hover .page-delete { display: block; }
        .page-item .page-delete:hover { color: #c44; }

        /* ── Import Button ── */
        #pagePanel .panel-actions {
            padding: 8px 12px;
            border-top: 1px solid #d8d8d8;
        }
        #pagePanel .panel-actions button {
            width: 100%;
            padding: 6px 10px;
            font-size: 12px;
            background: #fff;
            border: 1px solid #c0c0c0;
            border-radius: 3px;
            cursor: pointer;
            font-family: inherit;
            color: #444;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 5px;
        }
        #pagePanel .panel-actions button:hover { background: #e8e8e8; }

        /* ── Version History Panel ── */
        #versionPanel {
            display: none;
            position: absolute;
            top: 0;
            right: 0;
            width: 260px;
            height: 100%;
            background: #f7f7f7;
            border-left: 1px solid #d0d0d0;
            z-index: 500;
            flex-direction: column;
            box-shadow: -2px 0 8px rgba(0,0,0,0.08);
        }
        #versionPanel.open { display: flex; }
        #versionPanel .vp-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 12px;
            border-bottom: 1px solid #d8d8d8;
            font-size: 13px;
            font-weight: 600;
            color: #444;
        }
        #versionPanel .vp-header button {
            background: none;
            border: none;
            font-size: 18px;
            cursor: pointer;
            color: #888;
            line-height: 1;
        }
        #versionPanel .vp-header button:hover { color: #333; }
        #versionList {
            flex: 1;
            overflow-y: auto;
            padding: 4px 0;
        }
        .version-item {
            padding: 8px 12px;
            cursor: pointer;
            font-size: 12px;
            color: #333;
            border-bottom: 1px solid #eee;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .version-item:hover { background: #e8e8e8; }
        .version-item.active { background: #dce8f5; font-weight: 600; }
        .version-item .v-time { flex: 1; }
        .version-item .v-restore {
            display: none;
            background: #4a90d9;
            color: #fff;
            border: none;
            border-radius: 3px;
            padding: 3px 8px;
            font-size: 11px;
            cursor: pointer;
            font-family: inherit;
        }
        .version-item:hover .v-restore { display: block; }
        .version-item .v-restore:hover { background: #3a7bc8; }
        #versionPanel .vp-note {
            padding: 8px 12px;
            font-size: 11px;
            color: #999;
            border-top: 1px solid #ddd;
        }
        /* ── Version Preview Banner ── */
        #versionBanner {
            display: none;
            align-items: center;
            gap: 10px;
            padding: 6px 14px;
            background: #fff3cd;
            border-bottom: 1px solid #e0c86e;
            font-size: 13px;
            color: #664d03;
        }
        #versionBanner.show { display: flex; }
        #versionBanner span { flex: 1; }
        #versionBanner button {
            padding: 4px 12px;
            font-size: 12px;
            border: 1px solid #c0a030;
            border-radius: 3px;
            cursor: pointer;
            font-family: inherit;
            background: #fff;
            color: #664d03;
        }
        #versionBanner button:first-of-type {
            background: #4a90d9;
            color: #fff;
            border-color: #4a90d9;
        }
        #versionBanner button:hover { opacity: 0.85; }

        /* ── Lock Screen ── */
        #lockScreen {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: #2c3e50;
            z-index: 10000;
            justify-content: center;
            align-items: center;
        }
        #lockScreen.show { display: flex; }
        .lock-box {
            background: #fff;
            border-radius: 8px;
            padding: 32px 36px;
            width: 340px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
            text-align: center;
        }
        .lock-box h2 {
            font-size: 18px;
            color: #333;
            margin-bottom: 6px;
        }
        .lock-box p {
            font-size: 13px;
            color: #888;
            margin-bottom: 16px;
        }
        .lock-box input {
            width: 100%;
            padding: 10px 12px;
            font-size: 14px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-family: inherit;
            margin-bottom: 8px;
        }
        .lock-box input:focus { outline: none; border-color: #4a90d9; }
        .lock-box .lock-error {
            color: #c44;
            font-size: 12px;
            min-height: 18px;
            margin-bottom: 8px;
        }
        .lock-box button {
            width: 100%;
            padding: 10px;
            font-size: 14px;
            background: #4a90d9;
            color: #fff;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-family: inherit;
            margin-bottom: 6px;
        }
        .lock-box button:hover { background: #3a7bc8; }
        .lock-box .lock-secondary {
            background: none;
            color: #888;
            font-size: 12px;
            border: none;
            padding: 4px;
            cursor: pointer;
        }
        .lock-box .lock-secondary:hover { color: #333; }

        /* ── Settings Modal ── */
        #settingsOverlay {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.4);
            z-index: 9000;
            justify-content: center;
            align-items: center;
        }
        #settingsOverlay.show { display: flex; }
        .settings-box {
            background: #fff;
            border-radius: 8px;
            padding: 24px 28px;
            width: 360px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.2);
        }
        .settings-box h3 {
            font-size: 16px;
            color: #333;
            margin-bottom: 16px;
        }
        .settings-box label {
            font-size: 13px;
            color: #444;
            display: block;
            margin-bottom: 4px;
        }
        .settings-box select, .settings-box input {
            width: 100%;
            padding: 8px 10px;
            font-size: 13px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-family: inherit;
            margin-bottom: 14px;
        }
        .settings-box .s-row {
            display: flex;
            gap: 8px;
            justify-content: flex-end;
        }
        .settings-box .s-row button {
            padding: 7px 16px;
            font-size: 13px;
            border: 1px solid #ccc;
            border-radius: 4px;
            cursor: pointer;
            font-family: inherit;
            background: #fff;
        }
        .settings-box .s-row button.primary {
            background: #4a90d9;
            color: #fff;
            border-color: #4a90d9;
        }
        .settings-box .s-danger {
            display: block;
            margin-top: 10px;
            padding-top: 10px;
            border-top: 1px solid #eee;
        }
        .settings-box .s-danger button {
            background: none;
            border: none;
            color: #c44;
            font-size: 12px;
            cursor: pointer;
            font-family: inherit;
            padding: 0;
        }
        .settings-box .s-danger button:hover { text-decoration: underline; }

        /* ── Import toast ── */
        #importToast {
            display: none;
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: #333;
            color: #fff;
            padding: 10px 20px;
            border-radius: 6px;
            font-size: 13px;
            z-index: 5000;
        }

        /* ── Canvas ── */
        #canvas {
            flex: 1;
            position: relative;
            background: #fff;
            overflow: auto;
            min-height: 0;
        }
        #canvas-hint {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #bbb;
            font-size: 18px;
            pointer-events: none;
            user-select: none;
        }

        /* ── Text Boxes ── */
        .note-box {
            position: absolute;
            min-width: 160px;
            min-height: 60px;
            background: #fff;
            border: 2px solid transparent;
            display: inline-flex;
            flex-direction: column;
            z-index: 1;
            width: auto;
        }
        .note-box.selected {
            border-color: #4a90d9;
            z-index: 10;
        }
        .note-box .grab-handle {
            height: 14px;
            cursor: move;
            background: transparent;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 2px;
            flex-shrink: 0;
        }
        .note-box.selected .grab-handle {
            background: #4a90d9;
        }
        .note-box .grab-handle .dots {
            font-size: 9px;
            color: transparent;
            letter-spacing: 1px;
        }
        .note-box.selected .grab-handle .dots {
            color: rgba(255,255,255,0.7);
        }
        .note-box .delete-btn {
            display: none;
            background: none;
            border: none;
            color: #fff;
            font-size: 14px;
            cursor: pointer;
            line-height: 1;
            padding: 0 3px;
        }
        .note-box.selected .delete-btn { display: block; }
        .note-box .note-content {
            flex: 1;
            padding: 6px 8px;
            outline: none;
            font-size: 14px;
            line-height: 1.5;
            overflow: visible;
            resize: both;
            min-width: 140px;
            min-height: 40px;
        }
        .note-box.grabbed .note-content {
            background: #f0f0f0;
            cursor: default;
            user-select: none;
        }
        .note-box.grabbed .note-content * {
            cursor: default;
        }
        .note-box .note-content table {
            border-collapse: collapse;
            margin: 4px 0;
        }
        .note-box .note-content td {
            border: 1px solid #bbb;
            padding: 4px 8px;
            min-width: 30px;
            width: 80px;
            vertical-align: top;
            position: relative;
        }
        .note-box .note-content img {
            max-width: 100%;
            height: auto;
            cursor: default;
            display: block;
            margin: 4px 0;
            border-radius: 2px;
        }
        .note-box .note-content img:hover {
            outline: 2px solid #4a90d9;
        }
        .note-box .note-content ul,
        .note-box .note-content ol {
            padding-left: 24px;
            margin: 2px 0;
        }

        /* ── Table Picker ── */
        #tablePicker {
            display: none;
            position: absolute;
            background: #fff;
            border: 1px solid #c0c0c0;
            border-radius: 4px;
            padding: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.15);
            z-index: 2000;
        }
        #tablePicker .picker-label {
            text-align: center;
            font-size: 12px;
            color: #666;
            margin-bottom: 4px;
        }
        #tableGrid {
            display: grid;
            grid-template-columns: repeat(8, 20px);
            grid-template-rows: repeat(6, 20px);
            gap: 2px;
        }
        #tableGrid .cell {
            width: 20px;
            height: 20px;
            border: 1px solid #ccc;
            background: #fff;
            cursor: pointer;
        }
        #tableGrid .cell.highlight {
            background: #cde;
            border-color: #8ab;
        }

        /* ── Paragraph Spacing Popup ── */
        #paraSpacing {
            display: none;
            position: absolute;
            background: #fff;
            border: 1px solid #c0c0c0;
            border-radius: 4px;
            padding: 12px 16px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.15);
            z-index: 2000;
            width: 200px;
        }
        #paraSpacing label {
            display: block;
            font-size: 12px;
            color: #444;
            margin-bottom: 2px;
        }
        #paraSpacing .field {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 8px;
        }
        #paraSpacing .field input {
            width: 60px;
            height: 26px;
            border: 1px solid #c0c0c0;
            border-radius: 3px;
            padding: 2px 6px;
            font-size: 13px;
            font-family: inherit;
        }
        #paraSpacing .field span {
            font-size: 12px;
            color: #666;
        }
        #paraSpacing .title {
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 10px;
            color: #333;
        }
        #paraSpacing .btn-row {
            display: flex;
            justify-content: flex-end;
            gap: 6px;
            margin-top: 6px;
        }
        #paraSpacing .btn-row button {
            padding: 4px 12px;
            font-size: 12px;
            border: 1px solid #c0c0c0;
            border-radius: 3px;
            cursor: pointer;
            font-family: inherit;
            background: #fff;
        }
        #paraSpacing .btn-row button.primary {
            background: #4a90d9;
            color: #fff;
            border-color: #4a90d9;
        }

        /* ── Table Context Menu ── */
        #tableCtxMenu {
            display: none;
            position: fixed;
            background: #fff;
            border: 1px solid #c0c0c0;
            border-radius: 4px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.18);
            z-index: 3000;
            padding: 4px 0;
            min-width: 170px;
        }
        #tableCtxMenu .ctx-item {
            padding: 6px 16px;
            font-size: 13px;
            cursor: pointer;
            color: #333;
        }
        #tableCtxMenu .ctx-item:hover {
            background: #e8f0fb;
        }
        #tableCtxMenu .ctx-sep {
            height: 1px;
            background: #ddd;
            margin: 4px 0;
        }
    </style>
</head>
<body>

<!-- Toolbar -->
<div id="toolbar">
    <button onclick="fmt('bold')" title="Bold" id="btnBold"><b>B</b></button>
    <button onclick="fmt('italic')" title="Italic" id="btnItalic"><i>I</i></button>
    <button onclick="fmt('underline')" title="Underline" id="btnUnderline"><u>U</u></button>
    <div class="sep"></div>
    <select id="fontSize" onchange="applyFontSize()" title="Font Size">
        <option value="">Size</option>
        <option value="1">10</option>
        <option value="2">12</option>
        <option value="3">14</option>
        <option value="4">16</option>
        <option value="5">18</option>
        <option value="6">24</option>
        <option value="7">32</option>
    </select>
    <input type="color" id="fontColor" value="#000000" onchange="applyFontColor()" title="Text Color">
    <div class="sep"></div>
    <button onclick="fmt('justifyLeft')" title="Align Left">&#8676;</button>
    <button onclick="fmt('justifyCenter')" title="Align Center">&#8596;</button>
    <button onclick="fmt('justifyRight')" title="Align Right">&#8677;</button>
    <div class="sep"></div>
    <button onclick="fmt('insertUnorderedList')" title="Bullet List">&#8226; List</button>
    <button onclick="fmt('insertOrderedList')" title="Numbered List">1. List</button>
    <div class="sep"></div>
    <button onclick="toggleParaSpacing(event)" title="Paragraph Spacing" id="btnPara"><b>P</b></button>
    <div class="sep"></div>
    <button onclick="toggleTablePicker(event)" title="Insert Table" id="btnTable">Table</button>
    <div class="sep"></div>
    <button onclick="document.getElementById('imgFile').click()" title="Insert Image">Image</button>
    <input type="file" id="imgFile" accept="image/*" style="display:none" onchange="insertImage(event)">
    <div style="flex:1"></div>
    <button onclick="toggleVersionPanel()" title="Previous Page Versions" id="btnVersions">Versions</button>
    <button onclick="openSettings()" title="Settings">Settings</button>
    <button onclick="lockApp()" title="Lock Now">Lock</button>
</div>

<!-- Version Preview Banner -->
<div id="versionBanner">
    <span id="versionBannerText"></span>
    <button onclick="restorePreviewedVersion()" id="btnRestoreVersion">Restore This Version</button>
    <button onclick="closeVersionPreview()">Go Back</button>
</div>

<!-- Table Picker Popup -->
<div id="tablePicker">
    <div class="picker-label" id="pickerLabel">Select size</div>
    <div id="tableGrid"></div>
</div>

<!-- Paragraph Spacing Popup -->
<div id="paraSpacing">
    <div class="title">Paragraph Spacing</div>
    <div class="field">
        <label>Before:</label>
        <input type="number" id="spaceBefore" min="0" max="100" value="0">
        <span>px</span>
    </div>
    <div class="field">
        <label>After:</label>
        <input type="number" id="spaceAfter" min="0" max="100" value="0">
        <span>px</span>
    </div>
    <div class="btn-row">
        <button onclick="closeParaSpacing()">Cancel</button>
        <button class="primary" onclick="applyParaSpacing()">Apply</button>
    </div>
</div>

<!-- Table Context Menu -->
<div id="tableCtxMenu">
    <div class="ctx-item" onclick="tableCtxAction('insertRowAbove')">Insert Row Above</div>
    <div class="ctx-item" onclick="tableCtxAction('insertRowBelow')">Insert Row Below</div>
    <div class="ctx-sep"></div>
    <div class="ctx-item" onclick="tableCtxAction('insertColLeft')">Insert Column Left</div>
    <div class="ctx-item" onclick="tableCtxAction('insertColRight')">Insert Column Right</div>
    <div class="ctx-sep"></div>
    <div class="ctx-item" onclick="tableCtxAction('deleteRow')" style="color:#c44;">Delete Row</div>
    <div class="ctx-item" onclick="tableCtxAction('deleteCol')" style="color:#c44;">Delete Column</div>
    <div class="ctx-sep"></div>
    <div class="ctx-item" onclick="tableCtxAction('deleteTable')" style="color:#c44;">Delete Table</div>
</div>

<!-- Lock Screen -->
<div id="lockScreen">
    <div class="lock-box" id="lockBox">
        <!-- Dynamic: setup or unlock form -->
    </div>
</div>

<!-- Settings Modal -->
<div id="settingsOverlay" onclick="if(event.target===this)closeSettings()">
    <div class="settings-box">
        <h3>Settings</h3>
        <label>Auto-lock after inactivity:</label>
        <select id="settingsTimeout">
            <option value="0">Never</option>
            <option value="1">1 minute</option>
            <option value="5">5 minutes</option>
            <option value="10">10 minutes</option>
            <option value="15">15 minutes</option>
            <option value="30">30 minutes</option>
            <option value="60">1 hour</option>
        </select>
        <label>Change password:</label>
        <input type="password" id="settingsOldPw" placeholder="Current password">
        <input type="password" id="settingsNewPw" placeholder="New password">
        <input type="password" id="settingsNewPw2" placeholder="Confirm new password">
        <div id="settingsPwError" style="color:#c44;font-size:12px;min-height:18px;margin-bottom:8px;"></div>
        <div class="s-row">
            <button onclick="closeSettings()">Cancel</button>
            <button class="primary" onclick="saveSettings()">Save</button>
        </div>
        <div class="s-danger">
            <button onclick="removeEncryption()">Remove password and encryption...</button>
        </div>
    </div>
</div>

<!-- Import Toast -->
<div id="importToast"></div>

<!-- Main Area -->
<div id="main">
    <!-- Page Panel -->
    <div id="pagePanel">
        <div class="panel-header">
            <span>Pages</span>
            <button onclick="addPage()" title="Add Page">+</button>
        </div>
        <div class="panel-actions">
            <button onclick="document.getElementById('importFile').click()" title="Import OneNote HTML">Import .htm</button>
            <input type="file" id="importFile" accept=".htm,.html,.mht,.mhtml" style="display:none" onchange="importHTMLFile(event)">
        </div>
        <div id="pageList"></div>
    </div>

    <!-- Canvas -->
    <div id="canvas">
        <div id="canvas-hint">Double-click anywhere to add a note</div>
        <!-- Version History Panel -->
        <div id="versionPanel">
            <div class="vp-header">
                <span>Page Versions</span>
                <button onclick="toggleVersionPanel()">&times;</button>
            </div>
            <div id="versionList"></div>
            <div class="vp-note">Click to preview, "Restore" to roll back</div>
        </div>
    </div>
</div>

<script>
    // ── Encryption (AES-256-GCM via Web Crypto) ──
    const SALT_KEY = 'onenote_salt';
    const VERIFY_KEY = 'onenote_verify';
    const ENCRYPTED_KEY = 'onenote_encrypted';
    const SETTINGS_KEY = 'onenote_settings';
    let cryptoKey = null;
    let lockTimeout = null;

    function getSettings() {
        try { return JSON.parse(localStorage.getItem(SETTINGS_KEY)) || {}; } catch { return {}; }
    }
    function putSettings(s) { localStorage.setItem(SETTINGS_KEY, JSON.stringify(s)); }

    async function deriveKey(password, salt) {
        const enc = new TextEncoder();
        const keyMaterial = await crypto.subtle.importKey('raw', enc.encode(password), 'PBKDF2', false, ['deriveKey']);
        return crypto.subtle.deriveKey(
            { name: 'PBKDF2', salt: salt, iterations: 100000, hash: 'SHA-256' },
            keyMaterial,
            { name: 'AES-GCM', length: 256 },
            false,
            ['encrypt', 'decrypt']
        );
    }

    async function encryptData(key, plaintext) {
        const iv = crypto.getRandomValues(new Uint8Array(12));
        const enc = new TextEncoder();
        const cipher = await crypto.subtle.encrypt({ name: 'AES-GCM', iv }, key, enc.encode(plaintext));
        // Combine iv + ciphertext, store as base64
        const buf = new Uint8Array(iv.length + cipher.byteLength);
        buf.set(iv);
        buf.set(new Uint8Array(cipher), iv.length);
        return btoa(String.fromCharCode(...buf));
    }

    async function decryptData(key, b64) {
        const raw = Uint8Array.from(atob(b64), c => c.charCodeAt(0));
        const iv = raw.slice(0, 12);
        const data = raw.slice(12);
        const plain = await crypto.subtle.decrypt({ name: 'AES-GCM', iv }, key, data);
        return new TextDecoder().decode(plain);
    }

    function isEncrypted() {
        return !!localStorage.getItem(VERIFY_KEY);
    }

    function showLockScreen() {
        const lock = document.getElementById('lockScreen');
        const box = document.getElementById('lockBox');
        lock.classList.add('show');

        if (!isEncrypted()) {
            // First time — setup
            box.innerHTML = `
                <h2>Set Up Password</h2>
                <p>Encrypt your notes with a master password</p>
                <input type="password" id="pw1" placeholder="Password" autofocus>
                <input type="password" id="pw2" placeholder="Confirm password">
                <div class="lock-error" id="lockError"></div>
                <button onclick="setupPassword()">Set Password</button>
                <button class="lock-secondary" onclick="skipEncryption()">Skip — don't encrypt</button>
            `;
            setTimeout(() => { const el = document.getElementById('pw1'); if (el) el.focus(); }, 50);
        } else {
            // Unlock
            box.innerHTML = `
                <h2>Unlock Notes</h2>
                <p>Enter your password to decrypt</p>
                <input type="password" id="pwUnlock" placeholder="Password" autofocus>
                <div class="lock-error" id="lockError"></div>
                <button onclick="unlockApp()">Unlock</button>
            `;
            setTimeout(() => { const el = document.getElementById('pwUnlock'); if (el) el.focus(); }, 50);
        }

        // Enter key support
        box.addEventListener('keydown', function handler(e) {
            if (e.key === 'Enter') {
                if (document.getElementById('pwUnlock')) unlockApp();
                else if (document.getElementById('pw1')) setupPassword();
            }
        });
    }

    async function setupPassword() {
        const pw1 = document.getElementById('pw1').value;
        const pw2 = document.getElementById('pw2').value;
        const err = document.getElementById('lockError');
        if (!pw1) { err.textContent = 'Enter a password'; return; }
        if (pw1.length < 4) { err.textContent = 'Password must be at least 4 characters'; return; }
        if (pw1 !== pw2) { err.textContent = 'Passwords do not match'; return; }

        const salt = crypto.getRandomValues(new Uint8Array(16));
        localStorage.setItem(SALT_KEY, btoa(String.fromCharCode(...salt)));

        cryptoKey = await deriveKey(pw1, salt);

        // Store verification token
        const verify = await encryptData(cryptoKey, 'onenote_verified');
        localStorage.setItem(VERIFY_KEY, verify);

        document.getElementById('lockScreen').classList.remove('show');
        startApp();
        resetLockTimer();
    }

    function skipEncryption() {
        document.getElementById('lockScreen').classList.remove('show');
        cryptoKey = null;
        startApp();
    }

    async function unlockApp() {
        const pw = document.getElementById('pwUnlock').value;
        const err = document.getElementById('lockError');
        if (!pw) { err.textContent = 'Enter your password'; return; }

        const salt = Uint8Array.from(atob(localStorage.getItem(SALT_KEY)), c => c.charCodeAt(0));
        const key = await deriveKey(pw, salt);

        try {
            const result = await decryptData(key, localStorage.getItem(VERIFY_KEY));
            if (result !== 'onenote_verified') throw new Error();
        } catch {
            err.textContent = 'Wrong password';
            return;
        }

        cryptoKey = key;
        document.getElementById('lockScreen').classList.remove('show');
        startApp();
        resetLockTimer();
    }

    function lockApp() {
        // Save before locking
        if (cryptoKey) {
            saveCanvasToPage();
            encryptAndSave();
        }
        // Clear canvas
        document.getElementById('canvas').querySelectorAll('.note-box').forEach(b => b.remove());
        activeBox = null;
        pages = [];
        showLockScreen();
    }

    // ── Auto-lock timer ──
    function resetLockTimer() {
        clearTimeout(lockTimeout);
        const s = getSettings();
        const mins = parseInt(s.lockMinutes) || 0;
        if (mins > 0 && cryptoKey) {
            lockTimeout = setTimeout(() => lockApp(), mins * 60000);
        }
    }

    // Reset timer on any user activity
    ['mousedown', 'keydown', 'mousemove', 'touchstart'].forEach(evt => {
        document.addEventListener(evt, () => {
            if (cryptoKey && !document.getElementById('lockScreen').classList.contains('show')) {
                resetLockTimer();
            }
        }, { passive: true });
    });

    // ── Encrypted save/load ──
    async function encryptAndSave() {
        if (!cryptoKey) return;
        const data = JSON.stringify({ pages, activePageId });
        const encrypted = await encryptData(cryptoKey, data);
        localStorage.setItem(ENCRYPTED_KEY, encrypted);
        // Remove plaintext keys
        localStorage.removeItem('onenote_pages');
        localStorage.removeItem('onenote_active_page');
    }

    async function decryptAndLoad() {
        const raw = localStorage.getItem(ENCRYPTED_KEY);
        if (!raw || !cryptoKey) return false;
        try {
            const json = await decryptData(cryptoKey, raw);
            const data = JSON.parse(json);
            pages = data.pages || [];
            activePageId = data.activePageId || (pages[0] && pages[0].id);
            return true;
        } catch { return false; }
    }

    // ── Settings ──
    function openSettings() {
        const s = getSettings();
        document.getElementById('settingsTimeout').value = s.lockMinutes || '0';
        document.getElementById('settingsOldPw').value = '';
        document.getElementById('settingsNewPw').value = '';
        document.getElementById('settingsNewPw2').value = '';
        document.getElementById('settingsPwError').textContent = '';
        document.getElementById('settingsOverlay').classList.add('show');
    }

    function closeSettings() {
        document.getElementById('settingsOverlay').classList.remove('show');
    }

    async function saveSettings() {
        const s = getSettings();
        s.lockMinutes = document.getElementById('settingsTimeout').value;
        putSettings(s);
        resetLockTimer();

        // Handle password change
        const oldPw = document.getElementById('settingsOldPw').value;
        const newPw = document.getElementById('settingsNewPw').value;
        const newPw2 = document.getElementById('settingsNewPw2').value;
        const err = document.getElementById('settingsPwError');

        if (newPw) {
            if (!cryptoKey) {
                // Setting password for first time
                if (newPw.length < 4) { err.textContent = 'Password must be at least 4 characters'; return; }
                if (newPw !== newPw2) { err.textContent = 'New passwords do not match'; return; }
                const salt = crypto.getRandomValues(new Uint8Array(16));
                localStorage.setItem(SALT_KEY, btoa(String.fromCharCode(...salt)));
                cryptoKey = await deriveKey(newPw, salt);
                const verify = await encryptData(cryptoKey, 'onenote_verified');
                localStorage.setItem(VERIFY_KEY, verify);
                saveCanvasToPage();
                await encryptAndSave();
                closeSettings();
                showToast('Password set — notes are now encrypted');
                return;
            }
            // Changing existing password
            if (!oldPw) { err.textContent = 'Enter current password'; return; }
            const salt = Uint8Array.from(atob(localStorage.getItem(SALT_KEY)), c => c.charCodeAt(0));
            const testKey = await deriveKey(oldPw, salt);
            try {
                const r = await decryptData(testKey, localStorage.getItem(VERIFY_KEY));
                if (r !== 'onenote_verified') throw new Error();
            } catch { err.textContent = 'Current password is wrong'; return; }
            if (newPw.length < 4) { err.textContent = 'Password must be at least 4 characters'; return; }
            if (newPw !== newPw2) { err.textContent = 'New passwords do not match'; return; }

            // Re-encrypt with new password
            const newSalt = crypto.getRandomValues(new Uint8Array(16));
            localStorage.setItem(SALT_KEY, btoa(String.fromCharCode(...newSalt)));
            cryptoKey = await deriveKey(newPw, newSalt);
            const verify = await encryptData(cryptoKey, 'onenote_verified');
            localStorage.setItem(VERIFY_KEY, verify);
            saveCanvasToPage();
            await encryptAndSave();
            closeSettings();
            showToast('Password changed');
            return;
        }

        closeSettings();
        showToast('Settings saved');
    }

    async function removeEncryption() {
        if (!isEncrypted()) { closeSettings(); return; }
        if (!confirm('Remove password? Your notes will be stored unencrypted.')) return;
        // Decrypt and save as plaintext
        saveCanvasToPage();
        localStorage.setItem('onenote_pages', JSON.stringify(pages));
        localStorage.setItem('onenote_active_page', activePageId);
        localStorage.removeItem(ENCRYPTED_KEY);
        localStorage.removeItem(VERIFY_KEY);
        localStorage.removeItem(SALT_KEY);
        cryptoKey = null;
        clearTimeout(lockTimeout);
        closeSettings();
        showToast('Encryption removed');
    }

    // ── App startup ──
    function startApp() {
        if (cryptoKey) {
            decryptAndLoad().then(ok => {
                if (!ok) loadPagesPlaintext();
                finishStartup();
            });
        } else {
            loadPagesPlaintext();
            finishStartup();
        }
    }

    function finishStartup() {
        if (pages.length === 0) {
            pages = [{ id: 'page_1', name: 'Page 1', boxes: [] }];
        }
        if (!activePageId || !pages.find(p => p.id === activePageId)) {
            activePageId = pages[0].id;
        }
        renderPageList();
        loadCanvasForPage(activePageId);
    }

    const PAGES_KEY = 'onenote_pages';
    const ACTIVE_KEY = 'onenote_active_page';
    let pages = [];
    let activePageId = null;
    let activeBox = null;
    let nextBoxId = 1;
    let saveTimer = null;

    // ── Page Management ──
    function loadPagesPlaintext() {
        try {
            pages = JSON.parse(localStorage.getItem(PAGES_KEY)) || [];
        } catch { pages = []; }
        // Migrate from old single-page format
        if (pages.length === 0) {
            try {
                const old = JSON.parse(localStorage.getItem('onenote_boxes'));
                if (old && Array.isArray(old) && old.length > 0) {
                    pages = [{ id: 'page_1', name: 'Page 1', boxes: old }];
                    localStorage.removeItem('onenote_boxes');
                }
            } catch {}
        }
        activePageId = localStorage.getItem(ACTIVE_KEY) || (pages[0] && pages[0].id);
    }

    function savePages() {
        if (cryptoKey) {
            encryptAndSave();
        } else {
            localStorage.setItem(PAGES_KEY, JSON.stringify(pages));
            localStorage.setItem(ACTIVE_KEY, activePageId);
        }
    }

    function addPage() {
        const id = 'page_' + Date.now();
        const num = pages.length + 1;
        pages.push({ id: id, name: 'Page ' + num, boxes: [] });
        savePages();
        switchPage(id);
        renderPageList();
    }

    function deletePage(id, e) {
        e.stopPropagation();
        if (pages.length <= 1) return; // keep at least one page
        pages = pages.filter(p => p.id !== id);
        if (activePageId === id) {
            activePageId = pages[0].id;
        }
        savePages();
        renderPageList();
        loadCanvasForPage(activePageId);
    }

    function switchPage(id) {
        // Save current canvas state and snapshot before switching
        saveCanvasToPage();
        forceVersionSnapshot();
        activePageId = id;
        savePages();
        renderPageList();
        loadCanvasForPage(id);
        // Close version panel when switching pages
        document.getElementById('versionPanel').classList.remove('open');
    }

    function renderPageList() {
        const list = document.getElementById('pageList');
        list.innerHTML = '';
        pages.forEach(p => {
            const item = document.createElement('div');
            item.className = 'page-item' + (p.id === activePageId ? ' active' : '');
            item.addEventListener('click', () => switchPage(p.id));

            const name = document.createElement('span');
            name.className = 'page-name';
            name.textContent = p.name;

            // Double-click to rename
            name.addEventListener('dblclick', (e) => {
                e.stopPropagation();
                name.contentEditable = 'true';
                name.focus();
                // Select all text
                const range = document.createRange();
                range.selectNodeContents(name);
                const sel = window.getSelection();
                sel.removeAllRanges();
                sel.addRange(range);
            });
            name.addEventListener('blur', () => {
                name.contentEditable = 'false';
                const newName = name.textContent.trim();
                if (newName) {
                    p.name = newName;
                    savePages();
                }
                renderPageList();
            });
            name.addEventListener('keydown', (e) => {
                if (e.key === 'Enter') { e.preventDefault(); name.blur(); }
                if (e.key === 'Escape') { name.textContent = p.name; name.blur(); }
            });

            const del = document.createElement('button');
            del.className = 'page-delete';
            del.innerHTML = '&times;';
            del.title = 'Delete page';
            del.addEventListener('click', (e) => deletePage(p.id, e));

            item.appendChild(name);
            if (pages.length > 1) item.appendChild(del);
            list.appendChild(item);
        });
    }

    // ── Canvas ↔ Page ──
    function saveCanvasToPage() {
        const page = pages.find(p => p.id === activePageId);
        if (!page) return;
        const data = [];
        document.querySelectorAll('.note-box').forEach(box => {
            const content = box.querySelector('.note-content');
            data.push({
                id: box.dataset.id,
                x: parseInt(box.style.left) || 0,
                y: parseInt(box.style.top) || 0,
                width: box.offsetWidth,
                height: box.offsetHeight,
                html: content.innerHTML
            });
        });
        page.boxes = data;
    }

    function loadCanvasForPage(pageId) {
        const canvas = document.getElementById('canvas');
        // Remove existing note boxes
        canvas.querySelectorAll('.note-box').forEach(b => b.remove());
        activeBox = null;
        nextBoxId = 1;

        const page = pages.find(p => p.id === pageId);
        if (!page) return;

        let maxId = 0;
        page.boxes.forEach(d => {
            const numId = parseInt(d.id) || 0;
            if (numId > maxId) maxId = numId;
            createNoteBox(d.x, d.y, d.width, d.height, d.html, d.id);
        });
        nextBoxId = maxId + 1;

        // Show/hide hint
        const hint = document.getElementById('canvas-hint');
        if (hint) hint.style.display = page.boxes.length ? 'none' : '';
    }

    // ── Formatting ──
    function fmt(command) {
        document.execCommand(command, false, null);
        scheduleSave();
    }

    function applyFontSize() {
        const sel = document.getElementById('fontSize');
        if (sel.value) {
            document.execCommand('fontSize', false, sel.value);
            scheduleSave();
        }
        sel.value = '';
    }

    function applyFontColor() {
        document.execCommand('foreColor', false, document.getElementById('fontColor').value);
        scheduleSave();
    }

    // ── Table Picker ──
    function buildTableGrid() {
        const grid = document.getElementById('tableGrid');
        grid.innerHTML = '';
        for (let r = 0; r < 6; r++) {
            for (let c = 0; c < 8; c++) {
                const cell = document.createElement('div');
                cell.className = 'cell';
                cell.dataset.row = r + 1;
                cell.dataset.col = c + 1;
                cell.addEventListener('mouseenter', () => highlightGrid(r + 1, c + 1));
                cell.addEventListener('click', () => insertTable(r + 1, c + 1));
                grid.appendChild(cell);
            }
        }
    }

    function highlightGrid(rows, cols) {
        document.getElementById('pickerLabel').textContent = rows + ' x ' + cols;
        document.querySelectorAll('#tableGrid .cell').forEach(c => {
            const cr = +c.dataset.row, cc = +c.dataset.col;
            c.classList.toggle('highlight', cr <= rows && cc <= cols);
        });
    }

    function toggleTablePicker(e) {
        const picker = document.getElementById('tablePicker');
        if (picker.style.display === 'block') {
            picker.style.display = 'none';
            return;
        }
        const btn = e.currentTarget.getBoundingClientRect();
        picker.style.display = 'block';
        picker.style.left = btn.left + 'px';
        picker.style.top = btn.bottom + 4 + 'px';
    }

    function insertTable(rows, cols) {
        document.getElementById('tablePicker').style.display = 'none';
        if (!activeBox) return;
        const content = activeBox.querySelector('.note-content');
        let html = '<table>';
        for (let r = 0; r < rows; r++) {
            html += '<tr>';
            for (let c = 0; c < cols; c++) {
                html += '<td><br></td>';
            }
            html += '</tr>';
        }
        html += '</table><br>';
        content.focus();
        document.execCommand('insertHTML', false, html);
        scheduleSave();
    }

    // ── Text Box Creation ──
    function createNoteBox(x, y, w, h, html, id) {
        const box = document.createElement('div');
        box.className = 'note-box';
        box.dataset.id = id || nextBoxId++;
        box.style.left = x + 'px';
        box.style.top = y + 'px';
        if (w) box.style.minWidth = w + 'px';

        // Grab handle
        const handle = document.createElement('div');
        handle.className = 'grab-handle';
        const dots = document.createElement('span');
        dots.className = 'dots';
        dots.textContent = '\u2022\u2022\u2022';
        const delBtn = document.createElement('button');
        delBtn.className = 'delete-btn';
        delBtn.innerHTML = '&times;';
        delBtn.title = 'Delete';
        delBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            box.remove();
            if (activeBox === box) activeBox = null;
            scheduleSave();
            if (!document.querySelector('.note-box')) {
                const hint = document.getElementById('canvas-hint');
                if (hint) hint.style.display = '';
            }
        });
        handle.appendChild(dots);
        handle.appendChild(delBtn);

        // Content area
        const content = document.createElement('div');
        content.className = 'note-content';
        content.contentEditable = 'true';
        if (html) content.innerHTML = html;

        content.addEventListener('input', () => scheduleSave());
        content.addEventListener('focus', () => {
            if (!box.classList.contains('grabbed')) selectBox(box);
        });
        content.addEventListener('mousedown', (e) => {
            if (box.classList.contains('grabbed')) {
                e.preventDefault(); // prevent focus when grabbed
            }
            e.stopPropagation();
        });
        // Double-click content to enter edit mode
        content.addEventListener('dblclick', (e) => {
            if (box.classList.contains('grabbed')) {
                e.stopPropagation();
                editBox(box);
            }
        });

        // Tab key in tables
        content.addEventListener('keydown', (e) => {
            if (e.key === 'Tab') {
                const sel = window.getSelection();
                const td = sel.anchorNode ? sel.anchorNode.closest ? sel.anchorNode.closest('td') : sel.anchorNode.parentElement.closest('td') : null;
                if (td) {
                    e.preventDefault();
                    const cells = Array.from(content.querySelectorAll('td'));
                    const idx = cells.indexOf(td);
                    const next = e.shiftKey ? cells[idx - 1] : cells[idx + 1];
                    if (next) {
                        const range = document.createRange();
                        range.selectNodeContents(next);
                        sel.removeAllRanges();
                        sel.addRange(range);
                    }
                }
            }
        });

        box.appendChild(handle);
        box.appendChild(content);

        // Select on click
        box.addEventListener('mousedown', (e) => {
            selectBox(box);
        });

        // Drag via handle
        initDrag(handle, box);

        document.getElementById('canvas').appendChild(box);
        const hint = document.getElementById('canvas-hint');
        if (hint) hint.style.display = 'none';
        return box;
    }

    function selectBox(box) {
        if (activeBox && activeBox !== box) {
            activeBox.classList.remove('selected');
            activeBox.classList.remove('grabbed');
            const oldContent = activeBox.querySelector('.note-content');
            if (oldContent) oldContent.contentEditable = 'true';
        }
        box.classList.add('selected');
        activeBox = box;
    }

    function grabBox(box) {
        selectBox(box);
        box.classList.add('grabbed');
        const content = box.querySelector('.note-content');
        content.contentEditable = 'false';
        // Remove cursor / blur
        window.getSelection().removeAllRanges();
        content.blur();
    }

    function editBox(box) {
        selectBox(box);
        box.classList.remove('grabbed');
        const content = box.querySelector('.note-content');
        content.contentEditable = 'true';
        content.focus();
    }

    // ── Drag ──
    function initDrag(handle, box) {
        let dragging = false, startX, startY, origX, origY;

        handle.addEventListener('mousedown', (e) => {
            e.preventDefault();
            e.stopPropagation();
            dragging = true;
            startX = e.clientX;
            startY = e.clientY;
            origX = parseInt(box.style.left) || 0;
            origY = parseInt(box.style.top) || 0;
            grabBox(box);
            document.addEventListener('mousemove', onMove);
            document.addEventListener('mouseup', onUp);
        });

        function onMove(e) {
            if (!dragging) return;
            const dx = e.clientX - startX;
            const dy = e.clientY - startY;
            box.style.left = Math.max(0, origX + dx) + 'px';
            box.style.top = Math.max(0, origY + dy) + 'px';
        }

        function onUp() {
            dragging = false;
            document.removeEventListener('mousemove', onMove);
            document.removeEventListener('mouseup', onUp);
            scheduleSave();
        }
    }

    // ── Canvas double-click ──
    document.getElementById('canvas').addEventListener('dblclick', (e) => {
        if (e.target.closest('.note-box')) return;
        const canvas = document.getElementById('canvas');
        const rect = canvas.getBoundingClientRect();
        const x = e.clientX - rect.left + canvas.scrollLeft;
        const y = e.clientY - rect.top + canvas.scrollTop;
        const box = createNoteBox(x - 10, y - 10, 280, null, '');
        selectBox(box);
        box.querySelector('.note-content').focus();
    });

    // Deselect when clicking empty canvas
    document.getElementById('canvas').addEventListener('mousedown', (e) => {
        if (!e.target.closest('.note-box') && !e.target.closest('#toolbar') && !e.target.closest('#tablePicker')) {
            if (activeBox) {
                activeBox.classList.remove('selected');
                activeBox.classList.remove('grabbed');
                const c = activeBox.querySelector('.note-content');
                if (c) c.contentEditable = 'true';
                activeBox = null;
            }
        }
    });

    // Close popups on outside click
    document.addEventListener('mousedown', (e) => {
        if (!e.target.closest('#tablePicker') && !e.target.closest('#btnTable')) {
            document.getElementById('tablePicker').style.display = 'none';
        }
        if (!e.target.closest('#paraSpacing') && !e.target.closest('#btnPara')) {
            document.getElementById('paraSpacing').style.display = 'none';
        }
        if (!e.target.closest('#tableCtxMenu')) {
            document.getElementById('tableCtxMenu').style.display = 'none';
        }
    });

    // ── Delete key removes selected (non-editing) box ──
    document.addEventListener('keydown', (e) => {
        if (e.key !== 'Delete' || !activeBox) return;
        // Don't delete if user is typing in a contenteditable area
        const active = document.activeElement;
        if (active && (active.isContentEditable || active.tagName === 'INPUT' || active.tagName === 'TEXTAREA')) return;
        activeBox.remove();
        activeBox = null;
        scheduleSave();
        if (!document.querySelector('.note-box')) {
            const hint = document.getElementById('canvas-hint');
            if (hint) hint.style.display = '';
        }
    });

    // ── Persistence ──
    const VERSIONS_KEY = 'onenote_versions';
    const MAX_VERSIONS = 20;
    let versionSnapshotTimer = null;

    function scheduleSave() {
        clearTimeout(saveTimer);
        saveTimer = setTimeout(() => {
            saveCanvasToPage();
            savePages();
            scheduleVersionSnapshot();
        }, 300);
    }

    function scheduleVersionSnapshot() {
        // Debounce version snapshots to every 30 seconds of inactivity
        clearTimeout(versionSnapshotTimer);
        versionSnapshotTimer = setTimeout(() => {
            saveVersionSnapshot();
        }, 30000);
    }

    function getVersions() {
        try {
            return JSON.parse(localStorage.getItem(VERSIONS_KEY)) || {};
        } catch { return {}; }
    }

    function saveVersionSnapshot() {
        const page = pages.find(p => p.id === activePageId);
        if (!page || page.boxes.length === 0) return;

        const versions = getVersions();
        if (!versions[activePageId]) versions[activePageId] = [];

        const history = versions[activePageId];
        const snapshot = JSON.stringify(page.boxes);

        // Don't save if identical to last version
        if (history.length > 0 && JSON.stringify(history[history.length - 1].boxes) === snapshot) return;

        history.push({
            timestamp: Date.now(),
            boxes: JSON.parse(snapshot)
        });

        // Keep only the last MAX_VERSIONS
        if (history.length > MAX_VERSIONS) {
            history.splice(0, history.length - MAX_VERSIONS);
        }

        versions[activePageId] = history;
        try {
            localStorage.setItem(VERSIONS_KEY, JSON.stringify(versions));
        } catch (e) {
            // localStorage full — remove oldest versions across all pages
            for (const pid in versions) {
                if (versions[pid].length > 5) {
                    versions[pid] = versions[pid].slice(-5);
                }
            }
            try { localStorage.setItem(VERSIONS_KEY, JSON.stringify(versions)); } catch {}
        }
    }

    // Force a snapshot now (called on page switch)
    function forceVersionSnapshot() {
        clearTimeout(versionSnapshotTimer);
        saveVersionSnapshot();
    }

    // ── Paragraph Spacing ──
    function toggleParaSpacing(e) {
        const popup = document.getElementById('paraSpacing');
        if (popup.style.display === 'block') {
            popup.style.display = 'none';
            return;
        }
        const sel = window.getSelection();
        let block = null;
        if (sel.rangeCount && sel.anchorNode) {
            const node = sel.anchorNode.nodeType === 3 ? sel.anchorNode.parentElement : sel.anchorNode;
            block = node.closest('p, div, li, h1, h2, h3, h4, h5, h6');
        }
        document.getElementById('spaceBefore').value = block ? parseInt(block.style.marginTop) || 0 : 0;
        document.getElementById('spaceAfter').value = block ? parseInt(block.style.marginBottom) || 0 : 0;
        const btn = e.currentTarget.getBoundingClientRect();
        popup.style.display = 'block';
        popup.style.left = btn.left + 'px';
        popup.style.top = btn.bottom + 4 + 'px';
    }

    function closeParaSpacing() {
        document.getElementById('paraSpacing').style.display = 'none';
    }

    function applyParaSpacing() {
        const before = parseInt(document.getElementById('spaceBefore').value) || 0;
        const after = parseInt(document.getElementById('spaceAfter').value) || 0;
        const sel = window.getSelection();
        if (!sel.rangeCount || !sel.anchorNode) { closeParaSpacing(); return; }
        const node = sel.anchorNode.nodeType === 3 ? sel.anchorNode.parentElement : sel.anchorNode;
        let block = node.closest('p, div.note-content, li, h1, h2, h3, h4, h5, h6');
        if (block && block.classList.contains('note-content')) {
            document.execCommand('formatBlock', false, 'p');
            const newNode = sel.anchorNode.nodeType === 3 ? sel.anchorNode.parentElement : sel.anchorNode;
            block = newNode.closest('p');
        }
        if (block) {
            block.style.marginTop = before + 'px';
            block.style.marginBottom = after + 'px';
            scheduleSave();
        }
        closeParaSpacing();
    }

    // ── Table Column/Row Resize ──
    let resizing = null;

    document.addEventListener('mousemove', (e) => {
        if (resizing) return;
        const td = e.target.closest('td');
        if (!td) return;
        const rect = td.getBoundingClientRect();
        const nearRight = Math.abs(e.clientX - rect.right) < 5;
        const nearBottom = Math.abs(e.clientY - rect.bottom) < 5;
        if (nearRight) {
            td.style.cursor = 'col-resize';
        } else if (nearBottom) {
            td.style.cursor = 'row-resize';
        } else {
            td.style.cursor = '';
        }
    });

    document.addEventListener('mousedown', (e) => {
        const td = e.target.closest('td');
        if (!td) return;
        const rect = td.getBoundingClientRect();
        const nearRight = Math.abs(e.clientX - rect.right) < 5;
        const nearBottom = Math.abs(e.clientY - rect.bottom) < 5;
        if (!nearRight && !nearBottom) return;

        e.preventDefault();
        e.stopPropagation();
        const table = td.closest('table');
        const cellIndex = td.cellIndex;
        const rowIndex = td.parentElement.rowIndex;

        resizing = {
            type: nearRight ? 'col' : 'row',
            startX: e.clientX,
            startY: e.clientY,
            table: table,
            cellIndex: cellIndex,
            rowIndex: rowIndex,
            startWidth: td.offsetWidth,
            startHeight: td.offsetHeight
        };

        if (nearRight) {
            for (const row of table.rows) {
                if (row.cells[cellIndex]) {
                    row.cells[cellIndex].style.width = row.cells[cellIndex].offsetWidth + 'px';
                }
            }
        }

        document.addEventListener('mousemove', onResizeMove);
        document.addEventListener('mouseup', onResizeUp);
    }, true);

    function autoFitBox(table) {
        const box = table.closest('.note-box');
        if (!box) return;
        box.style.width = '';
        box.style.height = '';
        const content = box.querySelector('.note-content');
        if (content) {
            content.style.width = '';
            content.style.height = '';
        }
    }

    function onResizeMove(e) {
        if (!resizing) return;
        if (resizing.type === 'col') {
            const dx = e.clientX - resizing.startX;
            const newW = Math.max(30, resizing.startWidth + dx);
            for (const row of resizing.table.rows) {
                if (row.cells[resizing.cellIndex]) {
                    row.cells[resizing.cellIndex].style.width = newW + 'px';
                }
            }
        } else {
            const dy = e.clientY - resizing.startY;
            const newH = Math.max(16, resizing.startHeight + dy);
            const row = resizing.table.rows[resizing.rowIndex];
            if (row) {
                for (const cell of row.cells) {
                    cell.style.height = newH + 'px';
                }
            }
        }
        autoFitBox(resizing.table);
    }

    function onResizeUp() {
        if (resizing) autoFitBox(resizing.table);
        resizing = null;
        document.removeEventListener('mousemove', onResizeMove);
        document.removeEventListener('mouseup', onResizeUp);
        scheduleSave();
    }

    // ── Table Right-Click Context Menu ──
    let ctxTargetTd = null;

    document.addEventListener('contextmenu', (e) => {
        const td = e.target.closest('td');
        if (!td || !td.closest('.note-content')) return;
        e.preventDefault();
        ctxTargetTd = td;
        const menu = document.getElementById('tableCtxMenu');
        menu.style.display = 'block';
        menu.style.left = e.clientX + 'px';
        menu.style.top = e.clientY + 'px';
        const mr = menu.getBoundingClientRect();
        if (mr.right > window.innerWidth) menu.style.left = (e.clientX - mr.width) + 'px';
        if (mr.bottom > window.innerHeight) menu.style.top = (e.clientY - mr.height) + 'px';
    });

    function tableCtxAction(action) {
        document.getElementById('tableCtxMenu').style.display = 'none';
        if (!ctxTargetTd) return;
        const table = ctxTargetTd.closest('table');
        if (!table) return;
        const rowIdx = ctxTargetTd.parentElement.rowIndex;
        const colIdx = ctxTargetTd.cellIndex;
        const numCols = table.rows[0] ? table.rows[0].cells.length : 1;

        switch (action) {
            case 'insertRowAbove': {
                const row = table.insertRow(rowIdx);
                for (let i = 0; i < numCols; i++) { const c = row.insertCell(); c.innerHTML = '<br>'; }
                break;
            }
            case 'insertRowBelow': {
                const row = table.insertRow(rowIdx + 1);
                for (let i = 0; i < numCols; i++) { const c = row.insertCell(); c.innerHTML = '<br>'; }
                break;
            }
            case 'insertColLeft': {
                for (const row of table.rows) {
                    const c = row.insertCell(colIdx);
                    c.innerHTML = '<br>';
                }
                break;
            }
            case 'insertColRight': {
                for (const row of table.rows) {
                    const c = row.insertCell(colIdx + 1);
                    c.innerHTML = '<br>';
                }
                break;
            }
            case 'deleteRow': {
                if (table.rows.length <= 1) { table.remove(); break; }
                table.deleteRow(rowIdx);
                break;
            }
            case 'deleteCol': {
                if (numCols <= 1) { table.remove(); break; }
                for (const row of table.rows) {
                    if (row.cells[colIdx]) row.deleteCell(colIdx);
                }
                break;
            }
            case 'deleteTable': {
                table.remove();
                break;
            }
        }
        if (table.parentElement) autoFitBox(table);
        ctxTargetTd = null;
        scheduleSave();
    }

    // ── Import OneNote HTML ──
    function showToast(msg) {
        const t = document.getElementById('importToast');
        t.textContent = msg;
        t.style.display = 'block';
        setTimeout(() => t.style.display = 'none', 3000);
    }

    function importHTMLFile(e) {
        const file = e.target.files[0];
        if (!file) return;
        e.target.value = '';
        const reader = new FileReader();
        reader.onload = function(ev) {
            const html = ev.target.result;
            const pageName = file.name.replace(/\.(htm|html|mht|mhtml)$/i, '');
            parseAndImport(html, pageName);
        };
        reader.readAsText(file);
    }

    function cleanHTML(html) {
        // Remove XML declarations, comments, head/style/script blocks
        html = html.replace(/<xml[\s\S]*?<\/xml>/gi, '');
        html = html.replace(/<style[\s\S]*?<\/style>/gi, '');
        html = html.replace(/<script[\s\S]*?<\/script>/gi, '');
        html = html.replace(/<meta[^>]*>/gi, '');
        html = html.replace(/<link[^>]*>/gi, '');
        html = html.replace(/<!--[\s\S]*?-->/g, '');
        // Remove Office/OneNote namespace tags
        html = html.replace(/<o:[^>]*>[\s\S]*?<\/o:[^>]*>/gi, '');
        html = html.replace(/<o:[^>]*\/>/gi, '');
        // Remove class="MsoNormal" etc but keep the element
        html = html.replace(/\s*class="Mso[^"]*"/gi, '');
        html = html.replace(/\s*class="OneNote[^"]*"/gi, '');
        // Remove mso-* CSS properties from style attributes
        html = html.replace(/mso-[^;:"]+:[^;"]*(;|(?="))/gi, '');
        // Clean up empty style attributes
        html = html.replace(/\s*style="\s*"/gi, '');
        return html;
    }

    function parseAndImport(rawHTML, pageName) {
        const cleaned = cleanHTML(rawHTML);
        const parser = new DOMParser();
        const doc = parser.parseFromString(cleaned, 'text/html');
        const body = doc.body;
        if (!body || !body.innerHTML.trim()) {
            showToast('No content found in file');
            return;
        }

        // Try to extract title from the document
        const titleEl = doc.querySelector('title');
        const title = (titleEl && titleEl.textContent.trim()) || pageName;

        // Look for absolutely positioned elements (OneNote style)
        const absElements = body.querySelectorAll('[style*="position:absolute"], [style*="position: absolute"]');

        const newPageId = 'page_' + Date.now();
        const boxesData = [];

        if (absElements.length > 0) {
            // OneNote uses absolute positioning — preserve positions
            absElements.forEach((el, i) => {
                const style = el.style;
                const x = parseInt(style.left) || (50 + i * 20);
                const y = parseInt(style.top) || (50 + i * 80);
                const w = parseInt(style.width) || 300;
                // Strip position styles from the content itself
                el.style.position = '';
                el.style.left = '';
                el.style.top = '';
                boxesData.push({
                    id: String(i + 1),
                    x: x,
                    y: y,
                    width: w,
                    height: 0,
                    html: el.innerHTML
                });
            });
        } else {
            // No absolute positioning — split by major block elements
            const blocks = [];
            let currentBlock = [];

            for (const node of body.childNodes) {
                if (node.nodeType === 3 && !node.textContent.trim()) continue;
                const tag = node.tagName ? node.tagName.toLowerCase() : '';
                const isBreak = ['h1','h2','h3','h4','h5','h6','hr'].includes(tag);

                if (isBreak && currentBlock.length > 0) {
                    blocks.push(currentBlock);
                    currentBlock = [];
                }
                currentBlock.push(node);
                // Also break after tables to give them their own box
                if (tag === 'table') {
                    blocks.push(currentBlock);
                    currentBlock = [];
                }
            }
            if (currentBlock.length > 0) blocks.push(currentBlock);

            // If only one block or very few, put it all in one box
            if (blocks.length <= 1) {
                boxesData.push({
                    id: '1',
                    x: 40,
                    y: 20,
                    width: 600,
                    height: 0,
                    html: body.innerHTML
                });
            } else {
                let yPos = 20;
                blocks.forEach((block, i) => {
                    const div = document.createElement('div');
                    block.forEach(n => div.appendChild(n.cloneNode(true)));
                    const html = div.innerHTML.trim();
                    if (!html) return;
                    boxesData.push({
                        id: String(i + 1),
                        x: 40,
                        y: yPos,
                        width: 600,
                        height: 0,
                        html: html
                    });
                    yPos += 150;
                });
            }
        }

        if (boxesData.length === 0) {
            // Fallback: single box with all content
            boxesData.push({
                id: '1',
                x: 40,
                y: 20,
                width: 600,
                height: 0,
                html: body.innerHTML
            });
        }

        // Save current page first
        saveCanvasToPage();

        // Create new page with imported content
        pages.push({ id: newPageId, name: title, boxes: boxesData });
        activePageId = newPageId;
        savePages();
        renderPageList();
        loadCanvasForPage(newPageId);

        showToast('Imported "' + title + '" (' + boxesData.length + ' section' + (boxesData.length > 1 ? 's' : '') + ')');
    }

    // ── Paste Handler (OneNote clipboard cleanup) ──
    document.addEventListener('paste', (e) => {
        const content = e.target.closest('.note-content');
        if (!content) return;

        const clipHTML = e.clipboardData.getData('text/html');
        if (!clipHTML) return; // let plain text paste through normally

        // Check if it looks like Office/OneNote content
        const isOffice = /class="Mso|OneNote|xmlns:o=|mso-/i.test(clipHTML);
        if (!isOffice) return; // let normal HTML paste through

        e.preventDefault();

        let cleaned = cleanHTML(clipHTML);

        // Parse and extract just the body content
        const parser = new DOMParser();
        const doc = parser.parseFromString(cleaned, 'text/html');
        const body = doc.body;

        if (body) {
            // Remove absolute positioning from pasted elements
            body.querySelectorAll('[style]').forEach(el => {
                el.style.position = '';
                el.style.left = '';
                el.style.top = '';
            });
            cleaned = body.innerHTML;
        }

        // Remove excessive whitespace/empty paragraphs
        cleaned = cleaned.replace(/(<p[^>]*>)\s*(&nbsp;)?\s*(<\/p>)/gi, '');
        cleaned = cleaned.trim();

        if (cleaned) {
            document.execCommand('insertHTML', false, cleaned);
            scheduleSave();
        }
    });

    // ── Insert Image ──
    function insertImage(e) {
        const file = e.target.files[0];
        if (!file) return;
        e.target.value = '';
        processImageFile(file);
    }

    function processImageFile(file) {
        if (!file.type.startsWith('image/')) return;
        const reader = new FileReader();
        reader.onload = function(ev) {
            const dataUrl = ev.target.result;
            if (activeBox) {
                const content = activeBox.querySelector('.note-content');
                content.focus();
                document.execCommand('insertHTML', false, '<img src="' + dataUrl + '">');
            } else {
                // No active box — create a new one with the image
                const canvas = document.getElementById('canvas');
                const box = createNoteBox(40, 40, 400, null, '<img src="' + dataUrl + '">');
                selectBox(box);
            }
            scheduleSave();
        };
        reader.readAsDataURL(file);
    }

    // Drag-and-drop images onto canvas or note boxes
    document.getElementById('canvas').addEventListener('dragover', (e) => {
        e.preventDefault();
        e.dataTransfer.dropEffect = 'copy';
    });

    document.getElementById('canvas').addEventListener('drop', (e) => {
        e.preventDefault();
        const files = e.dataTransfer.files;
        if (!files.length) return;

        for (const file of files) {
            if (!file.type.startsWith('image/')) continue;
            const noteBox = e.target.closest('.note-box');
            if (noteBox) {
                selectBox(noteBox);
            } else {
                // Create a new box at the drop position
                const canvas = document.getElementById('canvas');
                const rect = canvas.getBoundingClientRect();
                const x = e.clientX - rect.left + canvas.scrollLeft;
                const y = e.clientY - rect.top + canvas.scrollTop;
                activeBox = null; // force processImageFile to create a new box
                const reader = new FileReader();
                reader.onload = function(ev) {
                    const box = createNoteBox(x - 10, y - 10, 400, null, '<img src="' + ev.target.result + '">');
                    selectBox(box);
                    scheduleSave();
                };
                reader.readAsDataURL(file);
                return;
            }
            processImageFile(file);
        }
    });

    // Also support pasting images
    document.addEventListener('paste', function handleImagePaste(e) {
        const content = e.target.closest('.note-content');
        if (!content) return;
        const items = e.clipboardData.items;
        for (const item of items) {
            if (item.type.startsWith('image/')) {
                e.preventDefault();
                const file = item.getAsFile();
                processImageFile(file);
                return;
            }
        }
    });

    // ── Version History Panel ──
    let previewingVersion = false;
    let previewedIndex = null;

    function toggleVersionPanel() {
        const panel = document.getElementById('versionPanel');
        const isOpen = panel.classList.contains('open');
        if (isOpen) {
            closeVersionPreview();
        } else {
            // Snapshot current state before opening
            saveCanvasToPage();
            forceVersionSnapshot();
            panel.classList.add('open');
            renderVersionList();
        }
    }

    function renderVersionList() {
        const list = document.getElementById('versionList');
        list.innerHTML = '';
        const versions = getVersions();
        const history = versions[activePageId] || [];

        if (history.length === 0) {
            list.innerHTML = '<div style="padding:12px;font-size:12px;color:#999;text-align:center;">No previous versions yet.<br>Versions are saved automatically.</div>';
            return;
        }

        // Show newest first
        const page = pages.find(p => p.id === activePageId);
        const pageName = page ? page.name : 'Page';
        for (let i = history.length - 1; i >= 0; i--) {
            const v = history[i];
            const item = document.createElement('div');
            item.className = 'version-item';

            const time = document.createElement('span');
            time.className = 'v-time';
            const d = new Date(v.timestamp);
            time.textContent = d.toLocaleDateString() + ' ' + d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });

            item.addEventListener('click', () => previewVersion(i));

            item.appendChild(time);
            list.appendChild(item);
        }
    }

    function previewVersion(index) {
        const versions = getVersions();
        const history = versions[activePageId] || [];
        if (!history[index]) return;

        previewingVersion = true;
        previewedIndex = index;

        // Load the snapshot onto the canvas (without saving it)
        const canvas = document.getElementById('canvas');
        canvas.querySelectorAll('.note-box').forEach(b => b.remove());
        activeBox = null;

        history[index].boxes.forEach(d => {
            createNoteBox(d.x, d.y, d.width, d.height, d.html, d.id);
        });

        // Highlight active version item
        document.querySelectorAll('.version-item').forEach(el => el.classList.remove('active'));
        const items = document.querySelectorAll('.version-item');
        const reverseIdx = (history.length - 1) - index;
        if (items[reverseIdx]) items[reverseIdx].classList.add('active');

        // Show banner
        const page = pages.find(p => p.id === activePageId);
        const pageName = page ? page.name : 'Page';
        const d = new Date(history[index].timestamp);
        const timeStr = d.toLocaleDateString() + ' ' + d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        document.getElementById('versionBannerText').textContent =
            'Viewing "' + pageName + '" from ' + timeStr;
        document.getElementById('versionBanner').classList.add('show');
    }

    function restorePreviewedVersion() {
        if (previewedIndex === null) return;
        const versions = getVersions();
        const history = versions[activePageId] || [];
        if (!history[previewedIndex]) return;

        // Save current as a version before restoring
        saveCanvasToPage();
        forceVersionSnapshot();

        // Apply the old version
        const page = pages.find(p => p.id === activePageId);
        if (page) {
            page.boxes = JSON.parse(JSON.stringify(history[previewedIndex].boxes));
            savePages();
        }

        previewingVersion = false;
        previewedIndex = null;
        document.getElementById('versionBanner').classList.remove('show');
        document.getElementById('versionPanel').classList.remove('open');
        loadCanvasForPage(activePageId);
        showToast('Page restored to previous version');
    }

    function closeVersionPreview() {
        document.getElementById('versionPanel').classList.remove('open');
        document.getElementById('versionBanner').classList.remove('show');
        if (previewingVersion) {
            loadCanvasForPage(activePageId);
            previewingVersion = false;
            previewedIndex = null;
        }
    }

    // ── Init ──
    buildTableGrid();
    if (isEncrypted()) {
        showLockScreen();
    } else {
        // No encryption — check if first visit to offer setup
        const hasData = localStorage.getItem(PAGES_KEY) || localStorage.getItem('onenote_boxes');
        if (!hasData) {
            showLockScreen(); // offer to set up password
        } else {
            startApp(); // existing unencrypted data, just load
        }
    }
</script>
</body>
